title: "%pdf-to-epub-title%"
description: "%pdf-to-epub-description%"
nodes:
  - node_id: upload-to-cloud#1
    title: "%1%"
    inputs_from:
      - handle: file
        value: /oomol-driver/desktop/2512.13084v1.pdf
        from_flow:
          - input_handle: file
    task: alicloud-oss::upload-to-cloud
  - node_id: pdf-converter#3
    title: "%pdf-3%"
    inputs_from:
      - handle: pdf_url
        from_node:
          - node_id: upload-to-cloud#1
            output_handle: remote_url
      - handle: output_format
        value: markdown
        from_flow:
          - input_handle: output_format
      - handle: model
        value: gundam
      - handle: poll_interval
        value: 3
      - handle: max_attempts
        value: 2400
      - handle: ignore_pdf_errors
        value: true
      - handle: ignore_ocr_errors
        value: true
    task: self::pdf-converter
inputs_def:
  - handle: file
    description: "%local-file-path-to-upload-to-cloud-storage%"
    json_schema:
      type: string
      ui:widget: file
    nullable: false
    executor_name: nodejs
  - handle: output_format
    json_schema:
      enum:
        - markdown
        - epub
      ui:options:
        labels:
          - Markdown
          - EPUB
    nullable: false
    description: "%pdf-converter-output-format%"
    value: epub
    executor_name: python
outputs_def:
  - handle: download_url
    json_schema:
      type: string
    nullable: false
    description: "%pdf-converter-download-url%"
    executor_name: python
outputs_from:
  - handle: download_url
    from_node:
      - node_id: pdf-converter#3
        output_handle: download_url
long_running: true
